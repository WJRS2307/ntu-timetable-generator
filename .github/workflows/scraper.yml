name: Daily Course Data Scraper

on:
  schedule:
    # Runs at 19:00 UTC, 3:00 AM Singapore Time (SGT)
    - cron: '0 19 * * *'
  
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ./scraper
        run: pip install -r requirements.txt

      - name: Run Scraper
        working-directory: ./scraper
        run: python run_scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/public/data/
          # Only commit if there are actually new changes to the data
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update university course data" && git push)

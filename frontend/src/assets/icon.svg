<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35817E" />
      <stop offset="100%" stop-color="#2a6664" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#bg)" />
  <!-- Calendar Background -->
  <rect x="25" y="30" width="70" height="60" rx="8" fill="#ffffff" />
  <!-- Calendar Header -->
  <rect x="25" y="30" width="70" height="15" fill="#e9ecef" stroke-width="0" style="border-top-left-radius: 8px; border-top-right-radius: 8px; clip-path: inset(0 0 0 0 round 8px 8px 0 0);" />
  <!-- Rings -->
  <rect x="35" y="22" width="6" height="16" rx="3" fill="#ff6b6b" />
  <rect x="79" y="22" width="6" height="16" rx="3" fill="#ff6b6b" />
  <!-- Content Blocks -->
  <rect x="35" y="55" width="20" height="8" rx="2" fill="#339af0" />
  <rect x="60" y="55" width="25" height="8" rx="2" fill="#fcc419" />
  <rect x="35" y="68" width="25" height="8" rx="2" fill="#20c997" />
  <rect x="65" y="68" width="20" height="8" rx="2" fill="#ff922b" />
</svg>